# ══════════════════════════════════════════════════════════════════════════════
# Playwright E2E Tests
#
# PURPOSE:
#   Runs the full Playwright test suite against the live production site
#   (https://eventhub.rahulshettyacademy.com) on every push to main.
#   The HTML report is uploaded as a GitHub Actions artifact so it can be
#   downloaded and reviewed from the workflow run page.
#
# ARTIFACT:
#   Name   : playwright-report
#   Path   : playwright-report/
#   Expires: 30 days
# ══════════════════════════════════════════════════════════════════════════════

name: Playwright E2E Tests

on:
  push:
    branches: [main]

  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '21.7.1'

jobs:
  playwright:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node.js setup ─────────────────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # ── Install root dependencies (includes @playwright/test) ─────────────────
      - name: Install dependencies
        run: npm ci

      # ── Install Playwright browser (Chromium only) ────────────────────────────
      # --with-deps installs the OS-level libraries Chromium needs on Ubuntu.
      # Only Chromium is installed because playwright.config.ts defines a single
      # project: { name: 'chromium' }.
      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      # ── Run all Playwright tests ──────────────────────────────────────────────
      # The config already sets: baseURL, headless: true, reporter: 'html'.
      # `--reporter=html` is passed explicitly so the HTML report is always
      # generated (even on success), not just when tests fail.
      - name: Run Playwright tests
        run: npx playwright test --reporter=html
        continue-on-error: true

      # ── Upload HTML report as artifact ────────────────────────────────────────
      # Uploaded regardless of test outcome so failures can always be inspected.
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # ── Job summary ───────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "### Playwright E2E Test Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Report artifact** | playwright-report (retained 30 days) |" >> $GITHUB_STEP_SUMMARY
