# ══════════════════════════════════════════════════════════════════════════════
# Playwright E2E Tests
#
# PURPOSE:
#   Builds a Docker image containing Node 20, all Playwright browsers, and the
#   test suite, then runs it against the live site so the runner needs no local
#   Node or browser installs.  The HTML report is uploaded as an artifact.
#
# ARTIFACT:
#   Name   : playwright-report
#   Path   : playwright-report/
#   Expires: 30 days
# ══════════════════════════════════════════════════════════════════════════════

name: Playwright E2E Tests

on:
  push:
    branches: [main]

  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build Docker image ────────────────────────────────────────────────────
      # Bakes Node 20 + all Playwright browsers into the image so the runner
      # needs no separate install steps.
      - name: Build Docker image
        run: docker build -t eventhub-tests .

      # ── Run tests inside the container ───────────────────────────────────────
      # Mounts report dirs back to the workspace so the artifact upload step
      # can read them after the container exits.
      # continue-on-error keeps the job alive so the report is always uploaded.
      - name: Run Playwright tests
        continue-on-error: true
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/playwright-report:/app/playwright-report \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            eventhub-tests

      # ── Upload HTML report as artifact ────────────────────────────────────────
      # Uploaded regardless of test outcome so failures can always be inspected.
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # ── Job summary ───────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "### Playwright E2E Test Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Report artifact** | playwright-report (retained 30 days) |" >> $GITHUB_STEP_SUMMARY
